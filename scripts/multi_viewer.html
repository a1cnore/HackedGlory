<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>VG Multi-Model Viewer</title>
<style>
body { margin: 0; background: #111; font-family: monospace; color: #ccc; }
#grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; padding: 2px; height: 100vh; }
.cell { position: relative; background: #1a1a2e; overflow: hidden; }
.cell canvas { width: 100% !important; height: 100% !important; }
.label { position: absolute; top: 4px; left: 6px; font-size: 11px; color: #8f8; z-index: 1; text-shadow: 0 0 3px #000; }
</style>
</head>
<body>
<div id="grid"></div>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

const models = [
  'Catherine_STRIP', 'Hero030_STRIP',
  'Hero015_strip', 'Hero020_strip',
  'Koshka_strip', 'test_cube',
  'Catherine_15AE1A1B_v2', 'Hero030_0DBACE6C_v2',
  'Glaive_ED2382E2_v2', 'Koshka_03E8D482_v2',
];

const grid = document.getElementById('grid');

for (const name of models) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = name.replace(/_v2$/, '').replace(/_filtered$/, ' (filtered)');
  cell.appendChild(label);
  grid.appendChild(cell);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 50000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  cell.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x404060, 2));
  const d = new THREE.DirectionalLight(0xffffff, 3);
  d.position.set(100, 200, 150);
  scene.add(d);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  const url = `/extracted_meshes/${name}.obj`;
  fetch(url).then(r => {
    if (!r.ok) { label.textContent += ' (404)'; return null; }
    return r.text();
  }).then(text => {
    if (!text) return;
    const loader = new OBJLoader();
    const obj = loader.parse(text);
    obj.traverse(c => {
      if (c.isMesh) {
        c.material = new THREE.MeshStandardMaterial({
          color: 0x7799cc, metalness: 0.1, roughness: 0.8,
          flatShading: true, side: THREE.DoubleSide
        });
      }
    });
    scene.add(obj);
    const box = new THREE.Box3().setFromObject(obj);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    controls.target.copy(center);
    camera.position.copy(center).add(new THREE.Vector3(0, maxDim * 0.3, maxDim * 1.8));
    controls.update();

    const geo = obj.children[0]?.geometry;
    const vc = geo?.attributes?.position?.count || '?';
    const tc = geo?.index ? geo.index.count / 3 : '?';
    label.textContent += ` (${vc}v ${tc}t)`;
  }).catch(e => { label.textContent += ' ERR'; });

  function resize() {
    const w = cell.clientWidth, h = cell.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    const w = cell.clientWidth, h = cell.clientHeight;
    if (renderer.domElement.width !== w || renderer.domElement.height !== h) resize();
    renderer.render(scene, camera);
  }
  animate();
}
</script>
</body>
</html>
